services:
  edge-agent:
    build:
      context: ..
      dockerfile: edge-runtime/Dockerfile
    container_name: aura-edge-agent
    restart: unless-stopped
    environment:
      - AURA_DEVICE_ID=${AURA_DEVICE_ID:-4c38065e-3c2d-4e44-8ca8-9c30a08059d0}
      - AURA_MQTT_HOST=${AURA_MQTT_HOST:-aura-mosquitto}
      - AURA_MQTT_PORT=${AURA_MQTT_PORT:-1883}
      - AURA_HARDWARE_TYPE=${AURA_HARDWARE_TYPE:-hailo8}
      - AURA_TELEMETRY_INTERVAL=${AURA_TELEMETRY_INTERVAL:-10}
      - AURA_INFERENCE_INTERVAL=${AURA_INFERENCE_INTERVAL:-0.1}
      - AURA_LOG_LEVEL=${AURA_LOG_LEVEL:-INFO}
      - AURA_WORK_DIR=${AURA_WORK_DIR:-/tmp/aura}
      - AURA_HARDWARE_DAEMON_HOST=${AURA_HARDWARE_DAEMON_HOST:-172.18.0.1}
      - AURA_PERIPHERALS=${AURA_PERIPHERALS:-camera_0}
    networks:
      - aura-net
    volumes:
      - ./data:/tmp/aura
      # Local configuration from the host (read-only)
      - ./config:/app/config
      # Hardware libraries — persistent across reboots.
      # Populated via OTA (update_libraries) upon connecting to the platform.
      - edge-agent-hardware:/app/hardware

networks:
  aura-net:
    name: ${AURA_DOCKER_NETWORK:-edge-net}
    external: ${AURA_DOCKER_NETWORK_EXTERNAL:-false}

volumes:
  edge-agent-hardware:

