syntax = "proto3";
package aura.deployment.v1;

service DeploymentService {
  rpc CreateDeployment(CreateDeploymentRequest) returns (DeploymentResponse);
  rpc GetDeployment(GetDeploymentRequest) returns (DeploymentResponse);
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);
  rpc ListDeviceDeployments(ListDeviceDeploymentsRequest) returns (ListDeploymentsResponse);
}

message CreateDeploymentRequest {
  string device_id = 1;
  string model_id = 2;
  string script_id = 3;
  string name = 4;
}
message GetDeploymentRequest { string id = 1; }
message ListDeploymentsRequest {}
message ListDeviceDeploymentsRequest { string device_id = 1; }
message DeploymentResponse {
  string id = 1;
  string device_id = 2;
  string model_id = 3;
  string script_id = 4;
  string status = 5;
  string sent_at = 6;
  string running_at = 7;
  string error_msg = 8;
  string created_at = 9;
  string name = 10;
}
message ListDeploymentsResponse { repeated DeploymentResponse deployments = 1; }
