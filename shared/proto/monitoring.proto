syntax = "proto3";
package aura.monitoring.v1;

service MonitoringService {
  rpc GetDeviceState(GetDeviceStateRequest) returns (DeviceStateResponse);
  rpc ListDeviceStates(ListDeviceStatesRequest) returns (ListDeviceStatesResponse);
  rpc GetInferenceResults(GetInferenceResultsRequest) returns (GetInferenceResultsResponse);
  rpc DeleteDeviceState(DeleteDeviceStateRequest) returns (DeleteDeviceStateResponse);
}

message GetDeviceStateRequest  { string device_id = 1; }
message ListDeviceStatesRequest {}
message GetInferenceResultsRequest {
  string device_id = 1;
  int32 limit = 2;
}

message DeviceStateResponse {
  string device_id = 1;
  string status = 2;
  string active_model_id = 3;
  string active_script_id = 4;
  string active_deployment_id = 5;
  float  cpu_percent = 6;
  float  ram_percent = 7;
  float  ram_used_mb = 8;
  string last_seen_at = 9;
  repeated float coordinates = 10;
  float  latency_ms = 11;
}
message ListDeviceStatesResponse { repeated DeviceStateResponse states = 1; }

message InferenceResult {
  string device_id = 1;
  string deployment_id = 2;
  string timestamp = 3;
  string result_json = 4;   // resultados serializados como JSON string
}
message GetInferenceResultsResponse { repeated InferenceResult results = 1; }

message DeleteDeviceStateRequest {
  string device_id = 1;
}

message DeleteDeviceStateResponse {
  bool success = 1;
}
